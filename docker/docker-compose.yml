version: "3.9"

networks:
  bominal-senior-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    restart: unless-stopped
    networks:
      - bominal-senior-network
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: bominalsenior
      POSTGRES_PASSWORD: bominalsenior
      POSTGRES_DB: bominalsenior
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominalsenior -d bominalsenior"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - bominal-senior-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  web-senior:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: web-senior
    restart: unless-stopped
    networks:
      - bominal-senior-network
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://bominalsenior:bominalsenior@postgres:5432/bominalsenior
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_SENIOR_APP_URL:-http://senior.localhost}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_SENIOR_API_URL:-http://senior.localhost/api}

  web-family:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: web-family
    restart: unless-stopped
    networks:
      - bominal-senior-network
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://bominalsenior:bominalsenior@postgres:5432/bominalsenior
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_FAMILY_APP_URL:-http://family.localhost}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_FAMILY_API_URL:-http://family.localhost/api}

  web-internal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: web-internal
    restart: unless-stopped
    networks:
      - bominal-senior-network
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://bominalsenior:bominalsenior@postgres:5432/bominalsenior
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_INTERNAL_APP_URL:-http://internal.localhost}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_INTERNAL_API_URL:-http://internal.localhost/api}

  web-government:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: web-government
    restart: unless-stopped
    networks:
      - bominal-senior-network
    ports:
      - "3003:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://bominalsenior:bominalsenior@postgres:5432/bominalsenior
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_GOVERNMENT_APP_URL:-http://government.localhost}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_GOVERNMENT_API_URL:-http://government.localhost/api}

  mobile-caregiver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: mobile-caregiver
    restart: unless-stopped
    networks:
      - bominal-senior-network
    ports:
      - "3004:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://bominalsenior:bominalsenior@postgres:5432/bominalsenior
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_CAREGIVER_APP_URL:-http://caregiver.localhost}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_CAREGIVER_API_URL:-http://caregiver.localhost/api}

  # ---------------------------------------------------------------------------
  # Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks:
      - bominal-senior-network
    ports:
      - "80:80"
    depends_on:
      - web-senior
      - web-family
      - web-internal
      - web-government
      - mobile-caregiver
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
