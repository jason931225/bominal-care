services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bominalcare
      POSTGRES_PASSWORD: bominalcare
      POSTGRES_DB: bominalcare
    ports:
      - "4003:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominalcare"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
