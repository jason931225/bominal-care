services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: bominalsenior
      POSTGRES_PASSWORD: bominalsenior
      POSTGRES_DB: bominalsenior
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominalsenior"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
