##############################################################################
# nginx.conf – Reverse proxy for Korea Senior Portal (development / staging)
##############################################################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml
        image/svg+xml
        font/opentype
        font/truetype
        font/woff
        font/woff2;

    # -------------------------------------------------------------------------
    # Shared proxy settings (reused across all upstreams)
    # -------------------------------------------------------------------------
    proxy_http_version  1.1;

    # WebSocket / HMR support
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    # Standard forwarding headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout  60s;
    proxy_send_timeout  60s;
    proxy_connect_timeout 10s;

    # -------------------------------------------------------------------------
    # Upstream definitions
    # -------------------------------------------------------------------------
    upstream web_senior {
        server web-senior:3000;
        keepalive 32;
    }

    upstream web_family {
        server web-family:3001;
        keepalive 32;
    }

    upstream web_internal {
        server web-internal:3002;
        keepalive 32;
    }

    upstream web_government {
        server web-government:3003;
        keepalive 32;
    }

    upstream web_caregiver {
        server mobile-caregiver:3004;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Shared security-headers snippet (included in every server block)
    # Nginx <1.9.2 does not support include inside server blocks from a snippet
    # file, so headers are repeated per-block below for compatibility.
    # -------------------------------------------------------------------------

    # =========================================================================
    # senior.localhost  →  web-senior:3000
    # =========================================================================
    server {
        listen 80;
        server_name senior.localhost;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection          "1; mode=block"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://web_senior;
        }
    }

    # =========================================================================
    # family.localhost  →  web-family:3001
    # =========================================================================
    server {
        listen 80;
        server_name family.localhost;

        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection          "1; mode=block"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://web_family;
        }
    }

    # =========================================================================
    # internal.localhost  →  web-internal:3002
    # =========================================================================
    server {
        listen 80;
        server_name internal.localhost;

        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection          "1; mode=block"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://web_internal;
        }
    }

    # =========================================================================
    # government.localhost  →  web-government:3003
    # =========================================================================
    server {
        listen 80;
        server_name government.localhost;

        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection          "1; mode=block"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://web_government;
        }
    }

    # =========================================================================
    # caregiver.localhost  →  mobile-caregiver:3004
    # =========================================================================
    server {
        listen 80;
        server_name caregiver.localhost;

        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection          "1; mode=block"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://web_caregiver;
        }
    }

    # =========================================================================
    # Default catch-all: silently drop unrecognised requests (return 444)
    # =========================================================================
    server {
        listen 80 default_server;
        server_name _;

        return 444;
    }
}
