# =============================================================================
# Google Cloud Build — Build → Push to Artifact Registry → Deploy Cloud Run + Firebase Hosting
# Region: us-central1 (Iowa) — colocated with Compute Engine e2-micro (Postgres)
# Optimized for GCP Always Free tier
# =============================================================================

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.rust'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bominal-server:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bominal-server:latest'

  # Deploy Cloud Run backend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'bominal-server'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bominal-server:latest'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      # --- Free tier: scale to zero, minimal resources ---
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'RUST_LOG=info,APP_ENV=production,WEBAUTHN_RP_ID=care.bominal.com,WEBAUTHN_RP_ORIGIN=https://care.bominal.com,CORS_ORIGINS=https://care.bominal.com,https://bominal-server-833094198766.us-central1.run.app'
      - '--set-secrets'
      - 'DATABASE_URL=bominal-db-url:latest'
      # --- Direct VPC egress (free, no connector needed) ---
      - '--network'
      - 'default'
      - '--subnet'
      - 'default'
      - '--vpc-egress'
      - 'private-ranges-only'

  # Firebase Hosting removed — using Cloudflare CDN instead
  # Cloud Run serves both API and static frontend assets

substitutions:
  _REGION: us-central1
  _REPO: bominal

options:
  logging: GCS_ONLY
  # Default machine (free 120 min/day) — slower but no cost
  # machineType: 'E2_HIGHCPU_8'

timeout: '3600s'
