# =============================================================================
# Google Cloud Build — Build → Push to Artifact Registry → Deploy Cloud Run + Firebase Hosting
# Region: asia-northeast3 (Seoul)
# =============================================================================

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.rust'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bominal-server:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bominal-server:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bominal-server'

  # Deploy Cloud Run backend (serves SSR + API)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'bominal-server'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/bominal-server:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'LEPTOS_SITE_ROOT=/site,RUST_LOG=info'

  # Deploy Firebase Hosting (CDN for static assets, rewrites to Cloud Run for SSR)
  - name: 'gcr.io/cloud-builders/npm'
    args: ['install', '-g', 'firebase-tools']
  - name: 'gcr.io/cloud-builders/npm'
    entrypoint: firebase
    args:
      - 'deploy'
      - '--only'
      - 'hosting'
      - '--project'
      - '${PROJECT_ID}'

substitutions:
  _REGION: asia-northeast3
  _REPO: bominal

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
